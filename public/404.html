<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>404 — Сторінку не знайдено | FashionLab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #080404;
      color: #ffffff;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 6rem;
      color: #C8302A;
      line-height: 1;
    }
    h2 {
      font-size: 1.5rem;
      margin: 16px 0 32px;
      color: #cccccc;
    }
    .links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: inline-block;
      padding: 12px 28px;
      border: 2px solid #C8302A;
      color: #ffffff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 1rem;
      transition: background-color 0.2s;
    }
    a:hover {
      background-color: #C8302A;
    }
  </style>
</head>
