<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Результат оплати — Vitaliia 3D Fashion Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080404;--s1:#110808;--s2:#160C0C;--s3:#1E1010;--acc:#C8302A;--acc2:#E8D8D5;--gold:#fbbf24;--grn:#34d399;--txt:#F5F2F0;--muted:#9A8A8A;--brd:rgba(200,48,42,.18)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.container{max-width:480px;width:100%;text-align:center}
.icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2.5rem}
.icon.success{background:rgba(52,211,153,.15);border:2px solid var(--grn)}
.icon.error{background:rgba(200,48,42,.15);border:2px solid var(--acc)}
.icon.loading{background:rgba(200,48,42,.1);border:2px solid var(--muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;margin-bottom:.75rem}
p{color:var(--muted);font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:var(--acc);border-radius:100px;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:600;color:#fff;text-decoration:none;transition:.2s}
.btn:hover{background:#a01e1e;transform:translateY(-2px)}
.details{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:1rem;margin-bottom:1.5rem;text-align:left}
.details p{font-size:.8rem;margin-bottom:.5rem;color:var(--txt)}
.details span{color:var(--muted)}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="icon loading" id="icon">⏳</div>
  <h1 id="title">Перевірка статусу оплати...</h1>
  <p id="desc">Зачекайте, будь ласка</p>
  
  <div class="hidden" id="details-box">
    <div class="details">
      <p>ID рахунку: <span id="invoice-id">-</span></p>
      <p>Сума: <span id="amount">-</span> грн</p>
    </div>
  </div>
  
  <div id="actions" class="hidden">
    <a href="/" class="btn">← На головну</a>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const invoiceId = urlParams.get('invoiceId');
const status = urlParams.get('status');

const icon = document.getElementById('icon');
const title = document.getElementById('title');
const desc = document.getElementById('desc');
const detailsBox = document.getElementById('details-box');
const actions = document.getElementById('actions');

document.getElementById('invoice-id').textContent = invoiceId || '-';

if (status) {
  if (status === 'success') {
    icon.className = 'icon success';
    icon.textContent = '✓';
    title.textContent = 'Оплата успішна!';
    desc.textContent = 'Дякуємо за оплату. Тепер ви маєте доступ до курсу.';
    detailsBox.classList.remove('hidden');
    actions.classList.remove('hidden');
  } else if (status === 'failure') {
    icon.className = 'icon error';
    icon.textContent = '✕';
    title.textContent = 'Оплата невдала';
    desc.textContent = 'Сталася помилка при оплаті. Спробуйте ще раз або зверніться до підтримки.';
    detailsBox.classList.remove('hidden');
    actions.classList.remove('hidden');
  } else if (status === 'expired') {
    icon.className = 'icon error';
    icon.textContent = '⏰';
    title.textContent = 'Час оплати минув';
    desc.textContent = 'Термін дії рахунку закінчився. Створіть новий платіж.';
    actions.classList.remove('hidden');
  } else {
    checkStatus();
  }
} else if (invoiceId) {
  checkStatus();
} else {
  icon.className = 'icon error';
  icon.textContent = '?';
  title.textContent = 'Невідомий статус';
  desc.textContent = 'Інформація про платіж недоступна.';
  actions.classList.remove('hidden');
}

async function checkStatus() {
  if (!invoiceId) return;
  
  try {
    const resp = await fetch(`/api/payment/status?invoiceId=${invoiceId}`);
    const data = await resp.json();
    
    if (data.ok) {
      document.getElementById('amount').textContent = (data.amount / 100).toFixed(2);
      
      if (data.status === 'success') {
        icon.className = 'icon success';
        icon.textContent = '✓';
        title.textContent = 'Оплата успішна!';
        desc.textContent = 'Дякуємо за оплату. Тепер ви маєте доступ до курсу.';
      } else if (data.status === 'failure') {
        icon.className = 'icon error';
        icon.textContent = '✕';
        title.textContent = 'Оплата невдала';
        desc.textContent = 'Сталася помилка при оплаті.';
      } else if (data.status === 'expired') {
        icon.className = 'icon error';
        icon.textContent = '⏰';
        title.textContent = 'Час оплати минув';
        desc.textContent = 'Термін дії рахунку закінчився.';
      } else if (data.status === 'processing') {
        icon.className = 'icon loading';
        icon.textContent = '⏳';
        title.textContent = 'Оплата обробляється';
        desc.textContent = 'Зачекайте декілька секунд і оновіть сторінку.';
        setTimeout(checkStatus, 3000);
        return;
      } else {
        icon.className = 'icon loading';
        icon.textContent = '⏳';
        title.textContent = 'Очікування оплати';
        desc.textContent = 'Рахунок створено. Перейдіть до оплати в Monobank.';
      }
      detailsBox.classList.remove('hidden');
      actions.classList.remove('hidden');
    } else {
      icon.className = 'icon error';
      icon.textContent = '!';
      title.textContent = 'Помилка';
      desc.textContent = data.error || 'Не вдалося перевірити статус.';
      actions.classList.remove('hidden');
    }
  } catch (e) {
    icon.className = 'icon error';
    icon.textContent = '!';
    title.textContent = 'Помилка з\'єднання';
    desc.textContent = 'Не вдалося зв\'язатися з сервером.';
    actions.classList.remove('hidden');
  }
}
</script>
</body>
</html>
